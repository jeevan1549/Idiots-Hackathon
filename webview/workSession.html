<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none';
            font-src https://fonts.gstatic.com;
            style-src 'unsafe-inline' {{cspSource}} https://fonts.googleapis.com;
            script-src 'unsafe-inline';
            img-src {{cspSource}} https: data:;">
  <title>BrownBoys</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>

  <img src="{{turtle_icon}}" alt="turtle_icon" class="animal" width="150px" height="150px">

  <h2>How long are you working?</h2>
  <p>Your turtoise will crawl until it reaches its destination.<br>Work hard and stay focus.</p>


  <!-- default work session option -->
  <div class="options">
    <button class="option-btn" onclick="pick(25)">25 mins</button>
    <button class="option-btn" onclick="pick(50)">50 mins</button>
    <button class="option-btn" onclick="pick(90)">90 mins</button>
  </div>

  <div class="custom-row">
    <input
      class="custom-input"
      type="number"
      id="custom-minutes"
      placeholder="custom"
      min="1"
      max="480"
    >
    <button class="custom-btn" onclick="pickCustom()">Go</button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();

    function pick(minutes) {
  vscode.postMessage({ command: 'startBreak', duration: minutes });
}

function pickCustom() {
  const val = parseInt(document.getElementById('custom-minutes').value);
  if (val && val > 0) {
    vscode.postMessage({ command: 'startBreak', duration: val });
  }

}
  </script>

</body>
</html>
