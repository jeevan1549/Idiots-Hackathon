<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none';
            font-src https://fonts.gstatic.com;
            style-src 'unsafe-inline' {{cspSource}} https://fonts.googleapis.com;
            script-src 'unsafe-inline';
            img-src {{cspSource}} https: data:;">
  <title>BrownBoys</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>

  <img src="{{cat_icon}}" alt="cat_icon" class="animal" width="150px" height="150px">

  <h2>How long will be your breaks?</h2>
  <p>When you finish a work session<br>take a break!</p>


  <!-- default work session option -->
  <div class="options">
    <button class="option-btn" onclick="pick(5)">5 mins</button>
    <button class="option-btn" onclick="pick(10)">10 mins</button>
    <button class="option-btn" onclick="pick(15)">15 mins</button>
  </div>


  <div class="custom-row">
    <input
      class="custom-input"
      type="number"
      id="custom-minutes"
      placeholder="custom"
      min="1"
      max="480"
    >
    <button class="custom-btn" onclick="pickCustom()">Go</button>
  </div>

  <script>
  const vscode = acquireVsCodeApi();

function pick(minutes) {
  vscode.postMessage({ command: 'startWater', duration: minutes, breakDuration: minutes });
}

function pickCustom() {
  const val = parseInt(document.getElementById('custom-minutes').value);
  if (val && val > 0) {
    vscode.postMessage({ command: 'startWater', duration: val, breakDuration: val });
  }
}
  </script>

</body>
</html>
