<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none';
            font-src https://fonts.gstatic.com;
            style-src 'unsafe-inline' {{cspSource}} https://fonts.googleapis.com;
            script-src 'unsafe-inline';
            img-src {{cspSource}} https: data:;">
  <title>BrownBoys</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>

  <nav>
    <img src="https://png.pngtree.com/recommend-works/png-clipart/20250601/ourmid/pngtree-cute-capybara-hand-drawn-png-image_16394180.png" 
    
    width="36" height="36" alt="mascot">

    <span class="brand">BROWNBOYS</span>
    <span class="tag">hackathon build</span>
  </nav>

  <div class="hero">
    <img
      class="mascot"
      src="https://png.pngtree.com/recommend-works/png-clipart/20250601/ourmid/pngtree-cute-capybara-hand-drawn-png-image_16394180.png"
      alt="break animal"
    >

    <h1>Your code buddy,<br><span>keeping you healthy</span></h1>

    <p>
      Tiny animals live in your editor and remind you to drink water,
      rest your eyes, and take breaks. Because shipping code shouldn't
      cost your health.
    </p>

    <div class="pills">
      <div class="pill">
        <div class="dot" style="background:#c4b8f0"></div>
        break tracker
      </div>
      <div class="pill">
        <div class="dot" style="background:#7ecba1"></div>
        water reminders
      </div>
      <div class="pill">
        <div class="dot" style="background:#f0c07a"></div>
        20-20-20 rule
      </div>
    </div>

    <button class="btn" id="get-started-btn">Get Started</button>
    <p class="hint">// VS Code extension · free &amp; open source</p>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    document.getElementById('get-started-btn').addEventListener('click', () => {
      vscode.postMessage({ command: 'getStarted' });
    });
  </script>

</body>
</html>
